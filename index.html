<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>La Contea di Urbech</title>

  <style>
    /* Stile base Matrix */
    body {
      margin: 0;
      padding: 0;
      background-color: #000;
      color: #00ff41;
      font-family: "Courier New", Courier, monospace;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    h1 {
      font-size: 2.5rem;
      text-shadow: 0 0 10px #00ff41;
      margin-bottom: 1rem;
    }

    h2 {
      font-size: 1.3rem;
      margin-bottom: 2rem;
      opacity: 0.9;
    }

    a {
      color: #00ff41;
      text-decoration: none;
      border-bottom: 1px solid #00ff41;
      padding-bottom: 2px;
      text-shadow: 0 0 5px #00ff41;
    }

    a:hover {
      color: #ffffff;
      border-bottom-color: #ffffff;
      text-shadow: 0 0 10px #ffffff;
    }

    .links {
      display: flex;
      gap: 2rem;
    }

    .footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.8rem;
      opacity: 0.6;
    }
  </style>
</head>

<body>
  <h1>Rendete gli onori al Conte di Urbech</h1>
  <h2>La Matrice osserva. Scegli il tuo accesso.</h2>

  <div class="links">
    <a href="https://dash.cloudflare.com/" target="_blank" rel="noopener">
      Cloudflare
    </a>

    <a href="https://github.com/" target="_blank" rel="noopener">
      GitHub
    </a>
    
    <a href="https://www.speedtest.net/" target="_blank" rel="noopener">
      SpeedTest
    </a>
  </div>

  <div class="footer">
    ➜ La Contea di Urbech · Accesso autorizzato
  </div>
</body>
</html>
